databaseChangeLog:
  - changeSet:
      id: 1
      author: yourname
      changes:
        - createTable:
            tableName: Singers
            columns:
              - column:
                  name: SingerId
                  type: INT64
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: FirstName
                  type: STRING(1024)
              - column:
                  name: LastName
                  type: STRING(1024)
                  constraints:
                    nullable: false
        - createTable:
            tableName: Albums
            columns:
              - column:
                  name: AlbumId
                  type: INT64
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: SingerId
                  type: INT64
                  constraints:
                    nullable: false
              - column:
                  name: AlbumTitle
                  type: STRING(1024)
            # Example of an interleaved table, a Spanner feature
            interleave:
              parent: Singers
              onDelete: CASCADE

