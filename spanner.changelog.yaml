databaseChangeLog:
  - changeSet:
      id: 1
      author: nirmal
      comment: Create users table for Spanner
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: user_id
                  type: INT64
              - column:
                  name: username
                  type: STRING(100)
              - column:
                  name: email
                  type: STRING(255)
              - column:
                  name: is_active
                  type: BOOL
              - column:
                  name: created_at
                  type: TIMESTAMP
      rollback:
        - dropTable:
            tableName: users
  - changeSet:
      id: 2
      author: nirmal
      comment: Create orders table
      changes:
        - createTable:
            tableName: orders
            columns:
              - column:
                  name: user_id
                  type: INT64
              - column:
                  name: order_id
                  type: INT64
              - column:
                  name: product_name
                  type: STRING(200)
              - column:
                  name: quantity
                  type: INT64
              - column:
                  name: total_amount
                  type: FLOAT64
              - column:
                  name: order_date
                  type: DATE
              - column:
                  name: status
                  type: STRING(50)
      rollback:
        - dropTable:
            tableName: orders
  - changeSet:
      id: 3
      author: nirmal
      comment: Create audit_logs table
      changes:
        - createTable:
            tableName: audit_logs
            columns:
              - column:
                  name: log_id
                  type: INT64
              - column:
                  name: table_name
                  type: STRING(100)
              - column:
                  name: operation
                  type: STRING(20)
              - column:
                  name: record_id
                  type: INT64
              - column:
                  name: changed_by
                  type: STRING(100)
              - column:
                  name: changed_at
                  type: TIMESTAMP
              - column:
                  name: details
                  type: STRING(MAX)
      rollback:
        - dropTable:
            tableName: audit_logs
