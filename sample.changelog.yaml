  - changeSet:
      id: 8
      author: dbe_team
      changes:
        - insert:
            tableName: employer
            columns:
              - column:
                  name: id
                  valueNumeric: 1
              - column:
                  name: company_name
                  value: "Tech Corp Inc"
        - insert:
            tableName: employer
            columns:
              - column:
                  name: id
                  valueNumeric: 2
              - column:
                  name: company_name
                  value: "Innovation Labs"
      rollback:
        - delete:
            tableName: employer
