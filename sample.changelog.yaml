databaseChangeLog:
  - changeSet:
      id: 1
      author: dbe_team
      changes:
        - createTable:
            tableName: employees
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(100)
  - changeSet:
      id: 2
      author: dbe_team
      changes:
        - createTable:
            tableName: employer
            columns:
              - column:
                  name: id
                  type: int
