            tableName: projects
            columns:
              - column:
                  name: start_date
              - column:
                  name: end_date
      rollback:
        - dropUniqueConstraint:
            tableName: departments
            constraintName: uk_department_name
        - dropIndex:
            indexName: idx_projects_dates
            tableName: projects
